services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: prodrag-postgres
    environment:
      POSTGRES_DB: prodrag
      POSTGRES_USER: prodrag
      POSTGRES_PASSWORD: prodrag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prodrag -d prodrag"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
